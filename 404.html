<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 h-screen flex items-center justify-center px-6 text-white">
    <div class="text-center">
        <h1 class="text-9xl font-extrabold tracking-widest">404</h1>
        <div class="bg-blue-500 px-2 text-sm rounded rotate-12 absolute transform -translate-y-16 translate-x-32">
            Page Not Found
        </div>
        <p class="text-2xl font-medium mt-8 mb-12">The legal path you are looking for does not exist.</p>
        <a href="index.html" class="border-2 border-white px-8 py-3 rounded-full font-bold hover:bg-white hover:text-blue-900 transition duration-300">
            Return to Safety
        </a>
    </div>
</body>
</html>
